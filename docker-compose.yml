version: '3.8'

services:
  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nutrisync-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Ollama (Local LLM) ──
  ollama:
    image: ollama/ollama:latest
    container_name: nutrisync-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # GPU support (uncomment for NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  # ── Backend (FastAPI) ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nutrisync-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma3:4b
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DATABASE_URL=postgresql://nutrisync:nutrisync_dev_pass@postgres:5432/nutrisync
      - DEBUG=false
    depends_on:
      ollama:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - chroma_data:/app/data/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: nutrisync-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=nutrisync
      - POSTGRES_PASSWORD=nutrisync_dev_pass
      - POSTGRES_DB=nutrisync
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrisync"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollama_data:
  postgres_data:
  chroma_data:
