version: '3.8'

services:
  # ── Ollama (Local LLM) ──
  ollama:
    image: ollama/ollama:latest
    container_name: nutrisync-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # GPU support (uncomment for NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  # ── Backend (FastAPI) ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nutrisync-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma3:4b
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - REDIS_URL=redis://redis:6379/0
      - MONGODB_URI=mongodb://mongodb:27017
    depends_on:
      - ollama
      - redis
      - mongodb
    volumes:
      - chroma_data:/app/data/chroma_db
    restart: unless-stopped

  # ── Redis (Cache + Celery Broker) ──
  redis:
    image: redis:alpine
    container_name: nutrisync-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── MongoDB (Meal Plans + Logs) ──
  mongodb:
    image: mongo:7
    container_name: nutrisync-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── ChromaDB (Vector Store) ──
  chromadb:
    image: chromadb/chroma:latest
    container_name: nutrisync-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  ollama_data:
  mongo_data:
  chroma_data:
