version: '3.8'

services:
  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nutrisync-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nutrisync-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Ollama (Local LLM) ──
  ollama:
    image: ollama/ollama:latest
    container_name: nutrisync-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    networks:
      - nutrisync-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Backend (FastAPI) ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nutrisync-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma3:4b
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DATABASE_URL=
      - SQLITE_DB_PATH=/app/backend/nutrisync.db
      - CHROMA_DB_PATH=/app/data/chroma_db
      - DEBUG=true
      - SECRET_KEY=${SECRET_KEY:-nutrisync_dev_key_change_in_production}
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - chroma_data:/app/data/chroma_db
      - backend_db:/app/backend
    restart: unless-stopped
    networks:
      - nutrisync-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  ollama_data:
  chroma_data:
  backend_db:

networks:
  nutrisync-net:
    driver: bridge
